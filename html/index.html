<!DOCTYPE html>
<html lang="de">
    <style>
/* Theme Variables */
:root {
    --accent-1: #f97316;
    --accent-2: #38bdf8;
    --accent-3: #22c55e;
}

.theme-classicLeather {
    --accent-1: #f97316;
    --accent-2: #22c55e;
    --accent-3: #eab308;
}

.theme-nightOps {
    --accent-1: #0ea5e9;
    --accent-2: #22c55e;
    --accent-3: #f97316;
}

.theme-desertDust {
    --accent-1: #f97316;
    --accent-2: #eab308;
    --accent-3: #22c55e;
}

.theme-neonMiami {
    --accent-1: #ec4899;
    --accent-2: #22d3ee;
    --accent-3: #fbbf24;
}

.theme-arcticBlue {
    --accent-1: #38bdf8;
    --accent-2: #22c55e;
    --accent-3: #e5e7eb;
}
.briefcase-design {
    --slot-bg: rgba(30, 41, 59, 0.5);
    --slot-border: rgba(71, 85, 105, 0.6);
    --panel-bg: rgba(51, 65, 85, 0.9);
    --panel-border: rgba(71, 85, 105, 0.5);
}

/* Backdrop Blur für bessere Lesbarkeit */
.backdrop-blur-sm {
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}

/* Drag & Drop Visual Feedback */
.dragging {
    opacity: 0.5;
    border: 2px dashed #f97316 !important;
}

.drag-hover {
    box-shadow: 0 0 10px 4px var(--accent-1), inset 0 0 0 2px var(--accent-1) !important;
    transform: scale(1.01);
}

/* Fade Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -110%); }
    to { opacity: 1; transform: translate(-50%, -100%); }
}

/* Settings Fade Transition */
.settings-fade-enter-active,
.settings-fade-leave-active {
    transition: opacity 0.3s ease;
}

.settings-fade-enter-from,
.settings-fade-leave-to {
    opacity: 0;
}

.settings-fade-enter-active > div,
.settings-fade-leave-active > div {
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.settings-fade-enter-from > div,
.settings-fade-leave-to > div {
    transform: scale(0.9);
    opacity: 0;
}

/* Context Menu - No transform/transition that could affect positioning */
.context-menu {
    transform: none !important;
}
</style>

    <style>
    /* CSS Reset */
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }
    
    /* WICHTIG: Definiert die volle Größe des NUI-Fensters */
    html, body, #app {
        width: 100%;
        height: 100%;
        overflow: hidden; /* Verhindert ungewollte Scrollbars */
        position: relative; /* Wichtig für die korrekte Positionierung der Children */
    }
    
    body {
        font-family: 'Inter', sans-serif;
        background-color: transparent; /* Muss transparent bleiben, damit man das Spiel sieht */
    }

    /* Transitions */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
