<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Inventory System</title>
    <style>
        /* Modern Design 2018-2025 - Glassmorphism & Clean Aesthetics */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            overflow: hidden;
            background: transparent;
        }

        #modern-inventory {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #modern-inventory.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Main Container - Glassmorphism */
        .inventory-container {
            width: 1200px;
            height: 720px;
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            padding: 28px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: grid;
            grid-template-columns: 280px 1fr 260px;
            gap: 20px;
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Header Bar */
        .inventory-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px 24px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            margin-left: 16px;
        }

        /* Close Button - Modern */
        .close-btn {
            width: 36px;
            height: 36px;
            background: rgba(239, 68, 68, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.5);
            transform: scale(1.05);
        }

        /* Left Sidebar */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 60px;
        }

        /* Wallet Card - Skeuomorphic kept */
        .wallet-card {
            background: linear-gradient(135deg, #3e2723 0%, #5d4037 50%, #3e2723 100%);
            border: 1px solid rgba(139, 69, 19, 0.5);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #8b4513 0px,
                #8b4513 4px,
                transparent 4px,
                transparent 8px
            );
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            color: #d4af37;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-slots {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Key Ring Card - Modern with metal effect */
        .keyring-card {
            background: linear-gradient(135deg, rgba(156, 163, 175, 0.15), rgba(107, 114, 128, 0.15));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(156, 163, 175, 0.3);
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }

        .keyring-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .key-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(168, 85, 247, 0.5);
            transform: translateX(4px);
        }

        .key-icon {
            font-size: 18px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* Center Area - Main Inventory */
        .center-area {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .inventory-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            flex: 1;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* Inventory Grid - Modern */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            max-height: 440px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Item Slot - Clean Modern */
        .item-slot {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-slot::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .item-slot:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(168, 85, 247, 0.5);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(168, 85, 247, 0.2);
        }

        .item-slot:hover::before {
            opacity: 1;
        }

        .item-slot.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }

        .item-slot.drag-over {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .item-icon {
            font-size: 36px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .item-name {
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-amount {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: #fbbf24;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        /* Hotbar - Modern */
        .hotbar-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px 20px;
            height: 130px;
        }

        .hotbar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            height: 100%;
        }

        .hotbar-slot {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 10px;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hotbar-slot:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(34, 197, 94, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(34, 197, 94, 0.2);
        }

        .hotbar-slot .item-icon {
            font-size: 32px;
        }

        .hotbar-slot .item-name {
            font-size: 10px;
        }

        /* Right Sidebar - Stats */
        .right-sidebar {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
        }

        .stat-item {
            margin-bottom: 20px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Weight Bar - Modern */
        .weight-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 8px;
            position: relative;
        }

        .weight-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .weight-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .weight-fill.warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .weight-fill.critical {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        .weight-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Scrollbar - Modern */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.3);
            border-radius: 10px;
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.5);
        }

        /* Wallet Slot Specific */
        .wallet-slot {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(139, 69, 19, 0.5);
            border-radius: 10px;
            padding: 8px;
            cursor: grab;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wallet-slot:hover {
            background: rgba(0, 0, 0, 0.4);
            border-color: #d4af37;
            transform: scale(1.05);
        }

        .wallet-slot .item-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .wallet-slot .item-name {
            font-size: 9px;
            color: #d4af37;
        }
    </style>
</head>
<body>
    <div id="modern-inventory">
        <div class="inventory-container">
            <!-- Header -->
            <div class="inventory-header">
                <div style="display: flex; align-items: center;">
                    <div class="header-title">INVENTAR</div>
                    <div class="header-subtitle">Organisiere deine Items</div>
                </div>
                <div class="close-btn" onclick="closeInventory()">×</div>
            </div>

            <!-- Left Sidebar -->
            <div class="left-sidebar">
                <!-- Wallet Card -->
                <div class="wallet-card">
                    <div class="card-title">
                        <span>💳</span>
                        <span>Geldbeutel</span>
                    </div>
                    <div class="wallet-slots" id="wallet-slots"></div>
                </div>

                <!-- Key Ring Card -->
                <div class="keyring-card">
                    <div class="card-title" style="color: rgba(255, 255, 255, 0.9);">
                        <span>🔑</span>
                        <span>Schlüsselbund</span>
                    </div>
                    <div class="keyring-list" id="keyring-list"></div>
                </div>
            </div>

            <!-- Center Area -->
            <div class="center-area">
                <!-- Main Inventory -->
                <div class="inventory-section">
                    <div class="section-header">
                        <div class="section-title">Hauptinventar</div>
                        <div class="section-count">
                            <span id="slots-used">0</span> / <span id="slots-total">30</span>
                        </div>
                    </div>
                    <div class="inventory-grid" id="inventory-grid"></div>
                </div>

                <!-- Hotbar -->
                <div class="hotbar-section">
                    <div class="hotbar-grid" id="hotbar-grid"></div>
                </div>
            </div>

            <!-- Right Sidebar - Stats -->
            <div class="right-sidebar">
                <div class="stats-card">
                    <div class="card-title" style="color: rgba(255, 255, 255, 0.9);">
                        <span>📊</span>
                        <span>Statistiken</span>
                    </div>

                    <div class="stat-item">
                        <div class="stat-label">Gewicht</div>
                        <div class="weight-bar">
                            <div class="weight-fill" id="weight-fill" style="width: 0%"></div>
                        </div>
                        <div class="weight-text" id="weight-text">0 / 50 kg</div>
                    </div>

                    <div class="stat-item">
                        <div class="stat-label">Bargeld</div>
                        <div class="stat-value">$<span id="money-amount">0</span></div>
                    </div>

                    <div class="stat-item">
                        <div class="stat-label">Bank</div>
                        <div class="stat-value" style="background: linear-gradient(135deg, #34d399, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                            $<span id="bank-amount">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Vanilla JS - No Vue needed
        let visible = false;
        let inventory = {
            wallet: [
                { name: 'Führerschein', icon: '🪪', amount: 1, slot: 0 },
                { name: 'Ausweis', icon: '🆔', amount: 1, slot: 1 },
                { name: 'Bargeld', icon: '💵', amount: 5000, slot: 2 },
                { name: 'Kreditkarte', icon: '💳', amount: 1, slot: 3 }
            ],
            keys: [
                { name: 'Wohnungsschlüssel #42', icon: '🔑' },
                { name: 'BMW M5 Schlüssel', icon: '🚗' },
                { name: 'Büroschlüssel', icon: '🏢' }
            ],
            main: [
                { name: 'Handy', icon: '📱', amount: 1, slot: 0 },
                { name: 'Burger', icon: '🍔', amount: 2, slot: 1 },
                { name: 'Wodka', icon: '🍾', amount: 1, slot: 2 },
                { name: 'Zigaretten', icon: '🚬', amount: 20, slot: 3 },
                { name: 'Feuerzeug', icon: '🔥', amount: 1, slot: 4 },
                { name: 'Dietrich', icon: '🔓', amount: 5, slot: 5 },
                { name: 'Verband', icon: '🩹', amount: 3, slot: 6 },
                { name: 'Medikit', icon: '💊', amount: 1, slot: 7 },
                { name: 'Brot', icon: '🍞', amount: 3, slot: 8 },
                { name: 'Wasser', icon: '💧', amount: 5, slot: 9 }
            ],
            hotbar: [
                { name: 'Pistole', icon: '🔫', amount: 1, slot: 0 },
                { name: 'Messer', icon: '🔪', amount: 1, slot: 1 },
                null,
                { name: 'Schlagstock', icon: '🏏', amount: 1, slot: 3 },
                null,
                null
            ]
        };

        let maxWeight = 50;
        let bankAmount = 125000;

        let draggedItem = null;
        let draggedFrom = null;

        function openInventory() {
            document.getElementById('modern-inventory').classList.add('active');
            visible = true;
            renderAll();
        }

        function closeInventory() {
            document.getElementById('modern-inventory').classList.remove('active');
            visible = false;
        }

                function renderAll() {
                    renderWallet();
                    renderKeys();
                    renderMain();
                    renderHotbar();
                    updateStats();
                }

        function renderWallet() {
            const container = document.getElementById('wallet-slots');
            container.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const item = inventory.wallet[i];
                const slot = createSlot(item, 'wallet', i, 'wallet-slot');
                container.appendChild(slot);
            }
        }

        function renderKeys() {
            const container = document.getElementById('keyring-list');
            container.innerHTML = '';
            
            inventory.keys.forEach((key, index) => {
                const keyEl = document.createElement('div');
                keyEl.className = 'key-item';
                keyEl.innerHTML = `
                    <div class="key-icon">${key.icon}</div>
                    <div>${key.name}</div>
                `;
                keyEl.onclick = () => {
                    console.log('Using key:', key.name);
                };
                container.appendChild(keyEl);
            });
        }

        function renderMain() {
            const container = document.getElementById('inventory-grid');
            container.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                const item = inventory.main.find(p => p && p.slot === i);
                const slot = createSlot(item, 'main', i, 'item-slot');
                container.appendChild(slot);
            }
        }

        function renderHotbar() {
            const container = document.getElementById('hotbar-grid');
            container.innerHTML = '';
            
            for (let i = 0; i < 6; i++) {
                const item = inventory.hotbar[i];
                const slot = createSlot(item, 'hotbar', i, 'hotbar-slot');
                container.appendChild(slot);
            }
        }

        function createSlot(item, zone, slotIndex, className) {
            const slot = document.createElement('div');
            slot.className = className;
            slot.draggable = !!item;
            slot.dataset.zone = zone;
            slot.dataset.slot = slotIndex;

            if (item) {
                slot.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    ${item.amount > 1 ? `<div class="item-amount">×${item.amount}</div>` : ''}
                `;

                slot.ondragstart = (e) => {
                    draggedItem = { ...item };
                    draggedFrom = { zone, slot: slotIndex };
                    slot.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                };

                slot.ondragend = () => {
                    slot.classList.remove('dragging');
                    draggedItem = null;
                    draggedFrom = null;
                };

                slot.oncontextmenu = (e) => {
                    e.preventDefault();
                    console.log('Using:', item.name);
                };
            }

            slot.ondragover = (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            };

            slot.ondragleave = () => {
                slot.classList.remove('drag-over');
            };

            slot.ondrop = (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                
                if (draggedItem && draggedFrom) {
                    const toZone = slot.dataset.zone;
                    const toSlot = parseInt(slot.dataset.slot);
                    moveItem(draggedFrom.zone, draggedFrom.slot, toZone, toSlot);
                }
            };

            return slot;
        }

        function moveItem(fromZone, fromSlot, toZone, toSlot) {
            if (fromZone === 'keys' || toZone === 'keys') return;

            let sourceArray = inventory[fromZone];
            let sourceItem = Array.isArray(sourceArray) 
                ? sourceArray.find(item => item && item.slot === fromSlot)
                : null;

            if (!sourceItem) return;

            let targetArray = inventory[toZone];
            let targetItem = Array.isArray(targetArray)
                ? targetArray.find(item => item && item.slot === toSlot)
                : null;

            if (targetItem) {
                targetItem.slot = fromSlot;
                sourceItem.slot = toSlot;
            } else {
                sourceItem.slot = toSlot;
            }

            if (fromZone !== toZone) {
                inventory[fromZone] = inventory[fromZone].filter(
                    item => !(item && item.slot === fromSlot)
                );
                inventory[toZone].push(sourceItem);
                
                if (targetItem) {
                    inventory[toZone] = inventory[toZone].filter(
                        item => !(item && item.slot === toSlot)
                    );
                    inventory[fromZone].push(targetItem);
                }
            }

            renderAll();
        }

        function updateStats() {
            const allItems = [
                ...inventory.wallet,
                ...inventory.main,
                ...inventory.hotbar.filter(i => i)
            ];
            
            const totalWeight = allItems.reduce((sum, item) => 
                sum + (item.amount || 1) * 0.5, 0
            );
            
            const weightPercent = Math.min((totalWeight / maxWeight) * 100, 100);
            const weightFill = document.getElementById('weight-fill');
            weightFill.style.width = weightPercent + '%';
            
            weightFill.className = 'weight-fill';
            if (weightPercent > 80) weightFill.classList.add('critical');
            else if (weightPercent > 60) weightFill.classList.add('warning');
            
            document.getElementById('weight-text').textContent = 
                `${totalWeight.toFixed(1)} / ${maxWeight} kg`;

            const moneyItem = inventory.wallet.find(i => i && i.name === 'Bargeld');
            document.getElementById('money-amount').textContent = 
                (moneyItem ? moneyItem.amount : 0).toLocaleString();

            document.getElementById('bank-amount').textContent = 
                bankAmount.toLocaleString();

            const usedSlots = inventory.main.filter(i => i).length;
            document.getElementById('slots-used').textContent = usedSlots;
        }

        // FiveM Events
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.action === 'open') openInventory();
            else if (data.action === 'close') closeInventory();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && visible) {
                closeInventory();
                if (typeof GetParentResourceName !== 'undefined') {
                    fetch(`https://${GetParentResourceName()}/close`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });
                }
            }
        });

        // Auto-open for testing
        setTimeout(openInventory, 500);
    </script>
</body>
</html>
